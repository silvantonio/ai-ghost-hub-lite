server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /probe/n8n {
        proxy_pass http://n8n:5678/healthz;
    }

    location /probe/n8n-worker {
        proxy_pass http://n8n-worker:5678/healthz;
    }

    location /probe/openwebui {
        proxy_pass http://openwebui:8080/health;
    }

    location /probe/ollama {
        proxy_pass http://ollama:11434/;
    }

    location /api/ollama/models {
        proxy_pass http://ollama:11434/api/tags;
    }
}
